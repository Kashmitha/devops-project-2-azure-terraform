
name: Terraform CI/CD
  
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
      
env:
  TF_VERSION: "1.14.7"
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
    
jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
            
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
          
      - name: Terraform Init
        run: terraform init
          
      - name: Terraform Validate
        run: terraform validate
          
      - name: Terraform Plan (dev)
        run: terraform plan -var-file="environments/dev.tfvars" -no-color
        continue-on-error: false
          
      - name: Terraform Apply (only on main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -var-file="environments/dev.tfvars"
        